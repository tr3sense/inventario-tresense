<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Tr3sense</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tr3sense">
<meta name="theme-color" content="#5c6d5d">
<style>
  :root {
    --bg: #f9f6e7; --bg2: #fff; --card: #fff;
    --border: #dbe3e2; --border2: #e8e4d0;
    --text: #333333; --text2: #888; --text3: #bbb;
    --green: #5c6d5d; --green2: #4a5a4b; --green3: #edf2ed;
    --pink: #dbc0bd; --pink2: #fdf0ee; --pink3: #c9908a;
    --yellow: #f1d688; --spinner: #5c6d5d;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); min-height: 100vh; padding: 16px; }

  /* SPLASH */
  .splash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .splash-logo { width: 200px; max-width: 80%; animation: pulse 0.8s ease-in-out 1; }
  .splash-text { font-size: 13px; color: var(--text3); margin-top: 24px; }
  @keyframes pulse { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.7; transform: scale(0.97); } }

  /* PIN */
  .pin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 999; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .pin-logo { width: 200px; max-width: 80%; margin-bottom: 32px; }
  .pin-title { font-size: 16px; color: var(--green); font-weight: 500; margin-bottom: 24px; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid var(--green); background: transparent; transition: background 0.2s; }
  .pin-dot.filled { background: var(--green); }
  .pin-dot.error { border-color: var(--pink3); background: var(--pink3); animation: shake 0.4s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-key { background: var(--card); border: 1.5px solid var(--border); border-radius: 14px; padding: 18px; font-size: 22px; font-weight: 500; color: var(--text); cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
  .pin-key:active { background: var(--green); color: var(--bg); transform: scale(0.95); }
  .pin-key.delete { font-size: 16px; color: var(--green); }
  .pin-key.empty { background: transparent; border-color: transparent; cursor: default; }
  .pin-error { font-size: 13px; color: var(--pink3); margin-top: 16px; min-height: 20px; }
  .pin-blocked { font-size: 13px; color: var(--pink3); margin-top: 8px; font-weight: 500; }

  /* DARK TOGGLE */

  /* APP */
  .app { display: none; }
  .header { background: var(--green); border-radius: 20px; padding: 24px 20px; margin-bottom: 16px; text-align: center; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .header-btn { background: none; border: none; cursor: pointer; color: #cdd8b0; font-size: 13px; }
  .logo-header { width: 180px; max-width: 80%; margin: 0 auto; display: block; filter: brightness(0) invert(1); }
  .card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid var(--border); }
  .card-title { font-size: 12px; font-weight: 600; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: var(--yellow); border-radius: 2px; }
  .producto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid var(--bg); }
  .producto-item:last-child { border-bottom: none; }
  .producto-nombre { font-size: 15px; font-weight: 500; color: var(--text); }
  .producto-sub { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .badge-bajo { display: inline-flex; align-items: center; gap: 4px; background: var(--pink2); color: var(--pink3); font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; margin-top: 3px; }
  .badge-bajo::before { content: '⚠'; font-size: 10px; }
  .stock-ring { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .stock-ring-ok { background: var(--green3); }
  .stock-ring-bajo { background: var(--pink2); }
  .stock-ok { font-size: 22px; font-weight: 700; color: var(--green); }
  .stock-bajo { font-size: 22px; font-weight: 700; color: var(--pink3); }
  .stock-label { font-size: 10px; color: var(--text3); }
  .alerta-banner { background: var(--pink2); border: 1px solid var(--pink); border-radius: 12px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: var(--pink3); display: none; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 500; color: var(--green); margin-bottom: 6px; display: block; }
  select, input[type=number], textarea { width: 100%; padding: 13px 14px; border: 1.5px solid var(--border); border-radius: 12px; font-size: 15px; color: var(--text); background: var(--bg); outline: none; appearance: none; font-family: inherit; }
  textarea { resize: none; height: 80px; font-size: 14px; }
  select:focus, input:focus, textarea:focus { border-color: var(--green); background: var(--card); }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .btn-primary { background: var(--green); color: #f9f6e7; }
  .btn-primary:hover { background: var(--green2); }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #9aab9b; cursor: not-allowed; }
  .btn-secondary { background: var(--bg); color: var(--green); border: 1.5px solid var(--border); margin-top: 8px; }

  /* SUCCESS ANIMATION */
  .success-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(92,109,93,0.92); z-index: 500; display: none; flex-direction: column; align-items: center; justify-content: center; }
  .success-icon { font-size: 72px; animation: popIn 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
  .success-msg { color: #f9f6e7; font-size: 20px; font-weight: 600; margin-top: 16px; animation: fadeUp 0.5s ease 0.2s both; }
  .success-sub { color: #cdd8b0; font-size: 14px; margin-top: 8px; animation: fadeUp 0.5s ease 0.3s both; }
  @keyframes popIn { 0%{transform:scale(0)} 100%{transform:scale(1)} }
  @keyframes fadeUp { 0%{opacity:0;transform:translateY(10px)} 100%{opacity:1;transform:translateY(0)} }

  .footer { text-align: center; padding: 20px 0 8px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .footer-logo { height: 28px; opacity: 0.6; }
  .footer a { font-size: 11px; color: var(--text3); text-decoration: underline; text-underline-offset: 2px; }
  .footer a:hover { color: var(--green); }
  .footer p { font-size: 10px; color: var(--text3); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--pink); color: #6b3f3a; }
  .toast.success { background: var(--green); color: #f9f6e7; }
  .loading { text-align: center; padding: 24px; color: var(--text3); font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--spinner); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ultimo-update { font-size: 11px; color: var(--text3); text-align: center; margin-top: 10px; }
  .inactividad-msg { font-size: 11px; color: var(--text3); text-align: center; margin-top: 4px; }
</style>
</head>
<body>

<!-- SPLASH -->
<div class="splash" id="splash">
  <img src="logo.png" alt="Tr3sense" class="splash-logo">
  <p class="splash-text">Cargando inventario...</p>
</div>

<!-- PIN -->
<div class="pin-screen" id="pin-screen">
  <img src="logo.png" alt="Tr3sense" class="pin-logo">
  <p class="pin-title">Ingresa tu PIN</p>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-keypad" id="pin-keypad">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key delete" onclick="pinDelete()">⌫</div>
  </div>
  <p class="pin-error" id="pin-error"></p>
  <p class="pin-blocked" id="pin-blocked"></p>
  <div class="footer">
    <img src="ntnatavergara_footer.png" alt="nt:natavergara" class="footer-logo">
    <a href="Terminos_Condiciones_ntnatavergara.docx" target="_blank">Términos y condiciones de uso</a>
    <p>Desarrollado por nt:natavergara</p>
  </div>
</div>

<!-- SUCCESS OVERLAY -->
<div class="success-overlay" id="success-overlay">
  <div class="success-icon">✓</div>
  <div class="success-msg" id="success-msg">Venta registrada</div>
  <div class="success-sub" id="success-sub"></div>
</div>

<!-- APP -->
<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <button class="header-btn" onclick="cerrarSesion()">⬠ salir</button>
      <button class="header-btn" onclick="cargarInventario()">↻</button>
    </div>
    <img src="logo.png" alt="Tr3sense" class="logo-header">
  </div>

  <div class="card">
    <div class="card-title">Stock actual</div>
    <div id="alerta-banner" class="alerta-banner"></div>
    <div id="lista-productos">
      <div class="loading"><div class="spinner"></div>Cargando inventario...</div>
    </div>
    <p class="ultimo-update" id="ultimo-update"></p>
    <p class="inactividad-msg" id="inactividad-msg"></p>
  </div>

  <div class="card">
    <div class="card-title">Registrar venta</div>
    <div class="form-group">
      <label class="form-label">Producto</label>
      <select id="select-producto">
        <option value="">Selecciona un producto...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cantidad vendida</label>
      <input type="number" id="input-cantidad" min="1" value="1">
    </div>
    <div class="form-group">
      <label class="form-label">Nota (opcional)</label>
      <textarea id="input-nota" placeholder="Ej: venta feria artesanal, cliente mayorista..."></textarea>
    </div>
    <button class="btn btn-primary" id="btn-registrar" onclick="registrarVenta()">Registrar venta</button>
    <button class="btn btn-secondary" onclick="cargarInventario()">Actualizar inventario</button>
  </div>

  <div class="footer">
    <img src="ntnatavergara_footer.png" alt="nt:natavergara" class="footer-logo">
    <a href="Terminos_Condiciones_ntnatavergara.docx" target="_blank">Términos y condiciones de uso</a>
    <p>Desarrollado por nt:natavergara</p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxCV6Rx5HFkaFcxsilL1juz-JoWusyPhKjb4kURSNyU1wD4meej5mzhEAFlSSE8mON7/exec";
const PIN_CORRECTO = "0825";
const MAX_INTENTOS = 3;
const INACTIVIDAD_MS = 5 * 60 * 1000; // 5 minutos

let pinActual = "";
let intentos = 0;
let bloqueado = false;
let timerInactividad = null;


}

// SPLASH
setTimeout(() => {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
}, 800);

function pinPress(num) {
  if (bloqueado || pinActual.length >= 4) return;
  pinActual += num;
  actualizarDots();
  if (pinActual.length === 4) setTimeout(verificarPin, 200);
}

function pinDelete() {
  if (bloqueado) return;
  pinActual = pinActual.slice(0, -1);
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinActual.length);
  }
}

function verificarPin() {
  if (pinActual === PIN_CORRECTO) {
    intentos = 0;
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarInventario();
    resetInactividad();
  } else {
    intentos++;
    for (let i = 0; i < 4; i++) {
      document.getElementById('dot-' + i).classList.add('error');
    }
    setTimeout(() => {
      for (let i = 0; i < 4; i++) {
        document.getElementById('dot-' + i).classList.remove('error', 'filled');
      }
    }, 500);
    pinActual = '';
    if (intentos >= MAX_INTENTOS) {
      bloqueado = true;
      document.getElementById('pin-error').textContent = '';
      document.getElementById('pin-blocked').textContent = 'Demasiados intentos. Espera 30 segundos.';
      document.getElementById('pin-keypad').style.opacity = '0.4';
      document.getElementById('pin-keypad').style.pointerEvents = 'none';
      setTimeout(() => {
        bloqueado = false;
        intentos = 0;
        document.getElementById('pin-blocked').textContent = '';
        document.getElementById('pin-keypad').style.opacity = '1';
        document.getElementById('pin-keypad').style.pointerEvents = 'auto';
      }, 30000);
    } else {
      document.getElementById('pin-error').textContent = `PIN incorrecto. ${MAX_INTENTOS - intentos} intento(s) restante(s).`;
    }
  }
}

function cerrarSesion() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  pinActual = '';
  intentos = 0;
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
  clearTimeout(timerInactividad);
}

function resetInactividad() {
  clearTimeout(timerInactividad);
  timerInactividad = setTimeout(() => {
    cerrarSesion();
    mostrarToast('Sesión cerrada por inactividad', 'error');
  }, INACTIVIDAD_MS);
  document.getElementById('inactividad-msg').textContent = '';
}

document.addEventListener('touchstart', resetInactividad);
document.addEventListener('click', resetInactividad);

async function cargarInventario() {
  document.getElementById('lista-productos').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  document.getElementById('alerta-banner').style.display = 'none';
  try {
    const res = await fetch(API_URL);
    const datos = await res.json();
    const select = document.getElementById('select-producto');
    select.innerHTML = '<option value="">Selecciona un producto...</option>';
    let html = '';
    let alertas = [];
    for (let i = 1; i < datos.length; i++) {
      if (!datos[i][0]) continue;
      const nombre = datos[i][0];
      const stock = datos[i][1];
      const minimo = datos[i][2] || 3;
      const bajo = stock <= minimo;
      if (bajo) alertas.push(nombre);
      html += `<div class="producto-item">
        <div>
          <div class="producto-nombre">${nombre}</div>
          ${bajo ? '<span class="badge-bajo">Reponer pronto</span>' : '<div class="producto-sub">En stock</div>'}
        </div>
        <div class="stock-ring ${bajo ? 'stock-ring-bajo' : 'stock-ring-ok'}">
          <div class="${bajo ? 'stock-bajo' : 'stock-ok'}">${stock}</div>
          <div class="stock-label">uds</div>
        </div>
      </div>`;
      select.innerHTML += `<option value="${nombre}">${nombre} (${stock} uds)</option>`;
    }
    document.getElementById('lista-productos').innerHTML = html;
    if (alertas.length > 0) {
      const banner = document.getElementById('alerta-banner');
      banner.textContent = '⚠ Stock bajo: ' + alertas.join(', ');
      banner.style.display = 'block';
    }
    const ahora = new Date();
    document.getElementById('ultimo-update').textContent = 'Actualizado: ' + ahora.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('lista-productos').innerHTML = '<div class="loading">Error cargando datos.</div>';
    mostrarToast('Error de conexión', 'error');
  }
}

async function registrarVenta() {
  const producto = document.getElementById('select-producto').value;
  const cantidad = parseInt(document.getElementById('input-cantidad').value);
  const nota = document.getElementById('input-nota').value.trim();
  if (!producto) { mostrarToast('Selecciona un producto', 'error'); return; }
  if (!cantidad || cantidad < 1) { mostrarToast('Escribe una cantidad válida', 'error'); return; }
  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ producto, cantidad, nota }) });
    const data = await res.json();
    if (data.ok) {
      document.getElementById('input-cantidad').value = 1;
      document.getElementById('select-producto').value = '';
      document.getElementById('input-nota').value = '';
      mostrarExito(producto, cantidad, data.nuevoStock);
      await cargarInventario();
    } else {
      mostrarToast(data.error || 'Error al registrar', 'error');
    }
  } catch(e) {
    mostrarToast('Error de conexión', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Registrar venta';
}

function mostrarExito(producto, cantidad, stock) {
  const overlay = document.getElementById('success-overlay');
  document.getElementById('success-msg').textContent = producto;
  document.getElementById('success-sub').textContent = cantidad + ' unidad(es) vendida(s) · Stock: ' + stock;
  overlay.style.display = 'flex';
  setTimeout(() => { overlay.style.display = 'none'; }, 2200);
}

function mostrarToast(msg, tipo) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (tipo || '');
  setTimeout(() => toast.className = 'toast', 3000);
}
</script>
</body>
</html>
