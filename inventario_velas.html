<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Tr3sense</title>
<link rel="icon" type="image/png" href="favicon.png">
<link rel="apple-touch-icon" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Tr3sense">
<meta name="theme-color" content="#5c6d5d">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9f6e7; min-height: 100vh; padding: 16px; }

  .pin-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f9f6e7; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
  .pin-logo { width: 200px; max-width: 80%; margin-bottom: 32px; }
  .pin-logo-header { width: 180px; max-width: 80%; margin: 0 auto; display: block; filter: brightness(0) invert(1); }
  .pin-title { font-size: 16px; color: #5c6d5d; font-weight: 500; margin-bottom: 24px; }
  .pin-dots { display: flex; gap: 14px; margin-bottom: 32px; }
  .pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #5c6d5d; background: transparent; transition: background 0.2s; }
  .pin-dot.filled { background: #5c6d5d; }
  .pin-keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 280px; }
  .pin-key { background: #fff; border: 1.5px solid #dbe3e2; border-radius: 14px; padding: 18px; font-size: 22px; font-weight: 500; color: #333; cursor: pointer; text-align: center; transition: all 0.15s; user-select: none; }
  .pin-key:active { background: #5c6d5d; color: #f9f6e7; transform: scale(0.95); }
  .pin-key.delete { font-size: 16px; color: #5c6d5d; }
  .pin-key.empty { background: transparent; border-color: transparent; cursor: default; }
  .pin-error { font-size: 13px; color: #c9908a; margin-top: 16px; min-height: 20px; }

  .app { display: none; }
  .header { background: #5c6d5d; border-radius: 20px; padding: 24px 20px; margin-bottom: 16px; text-align: center; }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .refresh-btn { background: none; border: none; cursor: pointer; color: #cdd8b0; font-size: 13px; }
  .lock-btn { background: none; border: none; cursor: pointer; color: #cdd8b0; font-size: 13px; }
  .card { background: #fff; border-radius: 20px; padding: 20px; margin-bottom: 16px; border: 1px solid #dbe3e2; }
  .card-title { font-size: 12px; font-weight: 600; color: #5c6d5d; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; display: flex; align-items: center; gap: 6px; }
  .card-title::before { content: ''; display: inline-block; width: 3px; height: 14px; background: #f1d688; border-radius: 2px; }
  .producto-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid #f9f6e7; }
  .producto-item:last-child { border-bottom: none; }
  .producto-nombre { font-size: 15px; font-weight: 500; color: #333333; }
  .producto-sub { font-size: 12px; color: #bbb; margin-top: 2px; }
  .badge-bajo { display: inline-block; background: #fdf0ee; color: #c9908a; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; margin-top: 3px; }
  .stock-ring { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-direction: column; }
  .stock-ring-ok { background: #edf2ed; }
  .stock-ring-bajo { background: #fdf0ee; }
  .stock-ok { font-size: 22px; font-weight: 700; color: #5c6d5d; }
  .stock-bajo { font-size: 22px; font-weight: 700; color: #dbc0bd; }
  .stock-label { font-size: 10px; color: #bbb; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 500; color: #5c6d5d; margin-bottom: 6px; display: block; }
  select, input[type=number] { width: 100%; padding: 13px 14px; border: 1.5px solid #dbe3e2; border-radius: 12px; font-size: 15px; color: #333; background: #f9f6e7; outline: none; appearance: none; }
  select:focus, input:focus { border-color: #5c6d5d; background: #fff; }
  .btn { width: 100%; padding: 16px; border-radius: 14px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
  .btn-primary { background: #5c6d5d; color: #f9f6e7; }
  .btn-primary:hover { background: #4a5a4b; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #9aab9b; cursor: not-allowed; }
  .btn-secondary { background: #f9f6e7; color: #5c6d5d; border: 1.5px solid #dbe3e2; margin-top: 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.error { background: #dbc0bd; color: #6b3f3a; }
  .toast.success { background: #5c6d5d; color: #f9f6e7; }
  .loading { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
  .spinner { width: 28px; height: 28px; border: 2px solid #dbe3e2; border-top-color: #5c6d5d; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .ultimo-update { font-size: 11px; color: #bbb; text-align: center; margin-top: 10px; }
</style>
</head>
<body>

<div class="pin-screen" id="pin-screen">
  <img src="logo.png" alt="Tr3sense" class="pin-logo">
  <p class="pin-title">Ingresa tu PIN</p>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="dot-0"></div>
    <div class="pin-dot" id="dot-1"></div>
    <div class="pin-dot" id="dot-2"></div>
    <div class="pin-dot" id="dot-3"></div>
  </div>
  <div class="pin-keypad">
    <div class="pin-key" onclick="pinPress('1')">1</div>
    <div class="pin-key" onclick="pinPress('2')">2</div>
    <div class="pin-key" onclick="pinPress('3')">3</div>
    <div class="pin-key" onclick="pinPress('4')">4</div>
    <div class="pin-key" onclick="pinPress('5')">5</div>
    <div class="pin-key" onclick="pinPress('6')">6</div>
    <div class="pin-key" onclick="pinPress('7')">7</div>
    <div class="pin-key" onclick="pinPress('8')">8</div>
    <div class="pin-key" onclick="pinPress('9')">9</div>
    <div class="pin-key empty"></div>
    <div class="pin-key" onclick="pinPress('0')">0</div>
    <div class="pin-key delete" onclick="pinDelete()">⌫</div>
  </div>
  <p class="pin-error" id="pin-error"></p>
</div>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <button class="lock-btn" onclick="cerrarSesion()">⬠ salir</button>
      <button class="refresh-btn" onclick="cargarInventario()">↻ actualizar</button>
    </div>
    <img src="logo.png" alt="Tr3sense" class="pin-logo-header">
  </div>

  <div class="card">
    <div class="card-title">Stock actual</div>
    <div id="lista-productos">
      <div class="loading"><div class="spinner"></div>Cargando inventario...</div>
    </div>
    <p class="ultimo-update" id="ultimo-update"></p>
  </div>

  <div class="card">
    <div class="card-title">Registrar venta</div>
    <div class="form-group">
      <label class="form-label">Producto</label>
      <select id="select-producto">
        <option value="">Selecciona un producto...</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cantidad vendida</label>
      <input type="number" id="input-cantidad" min="1" value="1">
    </div>
    <button class="btn btn-primary" id="btn-registrar" onclick="registrarVenta()">Registrar venta</button>
    <button class="btn btn-secondary" onclick="cargarInventario()">Actualizar inventario</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxCV6Rx5HFkaFcxsilL1juz-JoWusyPhKjb4kURSNyU1wD4meej5mzhEAFlSSE8mON7/exec";
const PIN_CORRECTO = "0825";
let pinActual = "";

function pinPress(num) {
  if (pinActual.length >= 4) return;
  pinActual += num;
  actualizarDots();
  if (pinActual.length === 4) setTimeout(verificarPin, 200);
}

function pinDelete() {
  pinActual = pinActual.slice(0, -1);
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

function actualizarDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('dot-' + i).classList.toggle('filled', i < pinActual.length);
  }
}

function verificarPin() {
  if (pinActual === PIN_CORRECTO) {
    document.getElementById('pin-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    cargarInventario();
  } else {
    document.getElementById('pin-error').textContent = 'PIN incorrecto. Intenta de nuevo.';
    pinActual = '';
    actualizarDots();
  }
}

function cerrarSesion() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('pin-screen').style.display = 'flex';
  pinActual = '';
  actualizarDots();
  document.getElementById('pin-error').textContent = '';
}

async function cargarInventario() {
  document.getElementById('lista-productos').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  try {
    const res = await fetch(API_URL);
    const datos = await res.json();
    const select = document.getElementById('select-producto');
    select.innerHTML = '<option value="">Selecciona un producto...</option>';
    let html = '';
    for (let i = 1; i < datos.length; i++) {
      if (!datos[i][0]) continue;
      const nombre = datos[i][0];
      const stock = datos[i][1];
      const minimo = datos[i][2] || 3;
      const bajo = stock <= minimo;
      html += `<div class="producto-item">
        <div>
          <div class="producto-nombre">${nombre}</div>
          ${bajo ? '<span class="badge-bajo">Reponer pronto</span>' : '<div class="producto-sub">En stock</div>'}
        </div>
        <div class="stock-ring ${bajo ? 'stock-ring-bajo' : 'stock-ring-ok'}">
          <div class="${bajo ? 'stock-bajo' : 'stock-ok'}">${stock}</div>
          <div class="stock-label">uds</div>
        </div>
      </div>`;
      select.innerHTML += `<option value="${nombre}">${nombre} (${stock} uds)</option>`;
    }
    document.getElementById('lista-productos').innerHTML = html;
    const ahora = new Date();
    document.getElementById('ultimo-update').textContent = 'Actualizado: ' + ahora.toLocaleTimeString('es-CO', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    document.getElementById('lista-productos').innerHTML = '<div class="loading">Error cargando datos.</div>';
    mostrarToast('Error de conexión', 'error');
  }
}

async function registrarVenta() {
  const producto = document.getElementById('select-producto').value;
  const cantidad = parseInt(document.getElementById('input-cantidad').value);
  if (!producto) { mostrarToast('Selecciona un producto', 'error'); return; }
  if (!cantidad || cantidad < 1) { mostrarToast('Escribe una cantidad válida', 'error'); return; }
  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';
  try {
    const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ producto, cantidad }) });
    const data = await res.json();
    if (data.ok) {
      mostrarToast('Venta registrada. Stock: ' + data.nuevoStock, 'success');
      document.getElementById('input-cantidad').value = 1;
      document.getElementById('select-producto').value = '';
      await cargarInventario();
    } else {
      mostrarToast(data.error || 'Error al registrar', 'error');
    }
  } catch(e) {
    mostrarToast('Error de conexión', 'error');
  }
  btn.disabled = false;
  btn.textContent = 'Registrar venta';
}

function mostrarToast(msg, tipo) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (tipo || '');
  setTimeout(() => toast.className = 'toast', 3000);
}
</script>
</body>
</html>
