<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inventario Tresense</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 16px; }
  .header { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #e8e8e4; display: flex; align-items: center; gap: 12px; }
  .logo { width: 44px; height: 44px; background: #fef3e2; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .header-text h1 { font-size: 18px; font-weight: 600; color: #1a1a1a; }
  .header-text p { font-size: 13px; color: #888; margin-top: 2px; }
  .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; border: 1px solid #e8e8e4; }
  .card-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 16px; }
  .producto-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0ec; }
  .producto-item:last-child { border-bottom: none; }
  .producto-nombre { font-size: 15px; font-weight: 500; color: #1a1a1a; }
  .producto-stock { display: flex; align-items: center; gap: 8px; }
  .stock-num { font-size: 22px; font-weight: 700; }
  .stock-ok { color: #22c55e; }
  .stock-bajo { color: #ef4444; }
  .stock-label { font-size: 11px; color: #aaa; }
  .badge-bajo { background: #fef2f2; color: #dc2626; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 13px; font-weight: 500; color: #555; margin-bottom: 6px; display: block; }
  select, input[type=number] { width: 100%; padding: 12px 14px; border: 1px solid #e0e0db; border-radius: 10px; font-size: 15px; color: #1a1a1a; background: #fafaf8; appearance: none; outline: none; }
  select:focus, input:focus { border-color: #d4a855; background: #fff; }
  .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
  .btn-primary { background: #d4a855; color: #fff; }
  .btn-primary:hover { background: #c49840; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:disabled { background: #e0c98a; cursor: not-allowed; }
  .btn-secondary { background: #f0f0ec; color: #555; margin-top: 8px; }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 12px 24px; border-radius: 100px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 100; }
  .toast.show { opacity: 1; }
  .toast.error { background: #ef4444; }
  .toast.success { background: #22c55e; }
  .loading { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
  .spinner { width: 24px; height: 24px; border: 2px solid #e0e0db; border-top-color: #d4a855; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .refresh-btn { background: none; border: none; cursor: pointer; color: #d4a855; font-size: 13px; font-weight: 500; padding: 0; }
  .header-right { margin-left: auto; }
  .ultimo-update { font-size: 11px; color: #bbb; text-align: center; margin-top: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🕯️</div>
  <div class="header-text">
    <h1>Inventario Tresense</h1>
    <p>Control de stock en tiempo real</p>
  </div>
  <div class="header-right">
    <button class="refresh-btn" onclick="cargarInventario()">↻ Actualizar</button>
  </div>
</div>

<div class="card">
  <div class="card-title">Stock actual</div>
  <div id="lista-productos">
    <div class="loading">
      <div class="spinner"></div>
      Cargando inventario...
    </div>
  </div>
  <p class="ultimo-update" id="ultimo-update"></p>
</div>

<div class="card">
  <div class="card-title">Registrar venta</div>
  <div class="form-group">
    <label class="form-label">Producto</label>
    <select id="select-producto">
      <option value="">Selecciona un producto...</option>
    </select>
  </div>
  <div class="form-group">
    <label class="form-label">Cantidad vendida</label>
    <input type="number" id="input-cantidad" min="1" value="1" placeholder="Cantidad">
  </div>
  <button class="btn btn-primary" id="btn-registrar" onclick="registrarVenta()">
    Registrar venta
  </button>
  <button class="btn btn-secondary" onclick="cargarInventario()">
    Actualizar inventario
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxCV6Rx5HFkaFcxsilL1juz-JoWusyPhKjb4kURSNyU1wD4meej5mzhEAFlSSE8mON7/exec";
let productos = [];

async function cargarInventario() {
  document.getElementById('lista-productos').innerHTML = '<div class="loading"><div class="spinner"></div>Cargando...</div>';
  
  try {
    const res = await fetch(API_URL);
    const datos = await res.json();
    
    productos = [];
    const select = document.getElementById('select-producto');
    select.innerHTML = '<option value="">Selecciona un producto...</option>';
    
    let html = '';
    for (let i = 1; i < datos.length; i++) {
      if (!datos[i][0]) continue;
      const nombre = datos[i][0];
      const stock = datos[i][1];
      const minimo = datos[i][2] || 3;
      const bajo = stock <= minimo;
      
      productos.push({ nombre, stock, minimo });
      
      html += `<div class="producto-item">
        <div>
          <div class="producto-nombre">${nombre}</div>
          ${bajo ? '<span class="badge-bajo">Stock bajo</span>' : ''}
        </div>
        <div class="producto-stock">
          <div>
            <div class="stock-num ${bajo ? 'stock-bajo' : 'stock-ok'}">${stock}</div>
            <div class="stock-label">unidades</div>
          </div>
        </div>
      </div>`;
      
      select.innerHTML += `<option value="${nombre}">${nombre} (${stock} uds)</option>`;
    }
    
    document.getElementById('lista-productos').innerHTML = html;
    const ahora = new Date();
    document.getElementById('ultimo-update').textContent = 'Actualizado: ' + ahora.toLocaleTimeString('es-CO', {hour: '2-digit', minute: '2-digit'});
    
  } catch(e) {
    document.getElementById('lista-productos').innerHTML = '<div class="loading">Error cargando datos. Verifica tu conexión.</div>';
    mostrarToast('Error de conexión', 'error');
  }
}

async function registrarVenta() {
  const producto = document.getElementById('select-producto').value;
  const cantidad = parseInt(document.getElementById('input-cantidad').value);
  
  if (!producto) { mostrarToast('Selecciona un producto', 'error'); return; }
  if (!cantidad || cantidad < 1) { mostrarToast('Escribe una cantidad válida', 'error'); return; }
  
  const btn = document.getElementById('btn-registrar');
  btn.disabled = true;
  btn.textContent = 'Registrando...';
  
  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ producto, cantidad })
    });
    const data = await res.json();
    
    if (data.ok) {
      mostrarToast('Venta registrada. Stock: ' + data.nuevoStock, 'success');
      document.getElementById('input-cantidad').value = 1;
      document.getElementById('select-producto').value = '';
      await cargarInventario();
    } else {
      mostrarToast(data.error || 'Error al registrar', 'error');
    }
  } catch(e) {
    mostrarToast('Error de conexión', 'error');
  }
  
  btn.disabled = false;
  btn.textContent = 'Registrar venta';
}

function mostrarToast(msg, tipo) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (tipo || '');
  setTimeout(() => toast.className = 'toast', 3000);
}

cargarInventario();
</script>
</body>
</html>
